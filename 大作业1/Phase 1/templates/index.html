<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurveyHub · 基于 MongoDB 的动态问卷系统</title>
    <style>
        :root {
            --primary:       #4f46e5;
            --primary-dark:  #3730a3;
            --primary-light: #818cf8;
            --success:       #10b981;
            --danger:        #ef4444;
            --warning:       #f59e0b;
            --cyan:          #0891b2;
            --gray-50:  #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow:    0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
            --shadow-md: 0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
            --shadow-lg: 0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
            --r: 8px;
            --r-lg: 12px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background:var(--gray-50);color:var(--gray-800);min-height:100vh;
        }

        /* ── Header ─────────────────────────────────────── */
        .header{
            background:linear-gradient(135deg,var(--primary),var(--primary-dark));
            color:#fff;height:60px;padding:0 24px;
            display:flex;align-items:center;justify-content:space-between;
            box-shadow:var(--shadow-md);position:sticky;top:0;z-index:200;
        }
        .header-logo{font-size:20px;font-weight:700;letter-spacing:-.5px;}
        .header-logo span{color:#a5b4fc;}
        .header-user{display:none;align-items:center;gap:10px;font-size:14px;}
        .header-user .uname{
            background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;
        }

        /* ── Layout ──────────────────────────────────────── */
        .wrap{max-width:860px;margin:0 auto;padding:32px 20px 60px;}

        /* ── Section visibility ───────────────────────────── */
        .section{display:none;animation:fadeUp .3s ease;}
        .section.active{display:block;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        /* ── Card ────────────────────────────────────────── */
        .card{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);border:1px solid var(--gray-200);overflow:hidden;}
        .card-hd{padding:18px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
        .card-hd h2{font-size:17px;font-weight:600;}
        .card-bd{padding:24px;}

        /* ── Form ────────────────────────────────────────── */
        .fg{margin-bottom:16px;}
        .fl{display:block;font-size:13px;font-weight:500;color:var(--gray-600);margin-bottom:5px;}
        .fi{
            width:100%;padding:10px 13px;border:1px solid var(--gray-300);
            border-radius:var(--r);font-size:14px;outline:none;background:#fff;
            transition:border-color .2s,box-shadow .2s;
        }
        .fi:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.12);}
        textarea.fi{resize:vertical;min-height:72px;}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .req{color:var(--danger);margin-left:3px;}

        /* ── Buttons ─────────────────────────────────────── */
        .btn{
            display:inline-flex;align-items:center;gap:6px;
            padding:9px 18px;border:none;border-radius:var(--r);
            font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;
        }
        .btn:disabled{opacity:.55;cursor:not-allowed;}
        .btn-p{background:var(--primary);color:#fff;}
        .btn-p:hover:not(:disabled){background:var(--primary-dark);}
        .btn-g{background:var(--success);color:#fff;}
        .btn-g:hover:not(:disabled){background:#059669;}
        .btn-d{background:var(--danger);color:#fff;}
        .btn-d:hover:not(:disabled){background:#dc2626;}
        .btn-c{background:var(--cyan);color:#fff;}
        .btn-c:hover:not(:disabled){background:#0e7490;}
        .btn-o{background:#fff;color:var(--gray-600);border:1px solid var(--gray-300);}
        .btn-o:hover:not(:disabled){background:var(--gray-50);border-color:var(--gray-400);}
        .btn-sm{padding:6px 12px;font-size:13px;}
        .btn-lg{padding:12px 22px;font-size:15px;}
        .btn-full{width:100%;justify-content:center;}
        .icon-btn{
            background:none;border:none;cursor:pointer;padding:5px;border-radius:6px;
            color:var(--gray-400);transition:.2s;display:inline-flex;align-items:center;
        }
        .icon-btn:hover{color:var(--danger);background:#fef2f2;}

        /* ── Auth ────────────────────────────────────────── */
        .auth-tabs{display:flex;border-bottom:1px solid var(--gray-200);}
        .auth-tab{
            flex:1;padding:14px;text-align:center;cursor:pointer;
            font-weight:500;color:var(--gray-500);
            border-bottom:2px solid transparent;transition:.2s;
        }
        .auth-tab.on{color:var(--primary);border-bottom-color:var(--primary);}
        .auth-body{padding:28px;}

        /* ── Page title ──────────────────────────────────── */
        .pg-title{
            display:flex;justify-content:space-between;align-items:flex-start;
            margin-bottom:22px;
        }
        .pg-title h1{font-size:22px;font-weight:700;}
        .pg-title p{font-size:13px;color:var(--gray-400);margin-top:4px;}

        /* ── Survey list ──────────────────────────────────── */
        .s-list{display:flex;flex-direction:column;gap:10px;}
        .s-item{
            background:#fff;border:1px solid var(--gray-200);border-radius:var(--r);
            padding:15px 18px;display:flex;align-items:center;gap:14px;
            transition:box-shadow .2s;
        }
        .s-item:hover{box-shadow:var(--shadow-md);}
        .s-info{flex:1;min-width:0;}
        .s-title{
            font-weight:600;font-size:15px;margin-bottom:5px;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
        }
        .s-meta{font-size:12px;color:var(--gray-400);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .s-actions{display:flex;gap:7px;align-items:center;flex-shrink:0;}

        /* ── Badges ──────────────────────────────────────── */
        .badge{
            display:inline-flex;align-items:center;
            padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;
        }
        .badge-pub{background:#d1fae5;color:#065f46;}
        .badge-cls{background:var(--gray-100);color:var(--gray-500);}

        /* ── Question builder ──────────────────────────────── */
        .q-card{
            background:var(--gray-50);border:1px solid var(--gray-200);
            border-left:4px solid var(--primary);border-radius:var(--r);
            padding:18px 20px;margin-bottom:12px;
        }
        .q-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
        .q-card-label{
            font-size:13px;font-weight:600;color:var(--primary);
            display:flex;align-items:center;gap:8px;
        }
        .q-type-tag{
            background:var(--primary);color:#fff;
            font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;
        }
        .q-id-tag{font-size:11px;color:var(--gray-400);font-weight:400;}

        .add-toolbar{
            background:var(--gray-50);border:1px dashed var(--gray-300);
            border-radius:var(--r);padding:14px 16px;
            display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;
        }
        .add-toolbar span{font-size:13px;color:var(--gray-500);font-weight:500;}

        /* ── Fill form ────────────────────────────────────── */
        .fill-banner{
            background:linear-gradient(135deg,var(--primary),#7c3aed);
            color:#fff;border-radius:var(--r-lg);padding:22px 26px;margin-bottom:20px;
        }
        .fill-banner h2{font-size:21px;font-weight:700;margin-bottom:5px;}
        .fill-banner p{opacity:.85;font-size:14px;}

        .fq-card{
            background:#fff;border:1px solid var(--gray-200);
            border-radius:var(--r);padding:20px;margin-bottom:12px;transition:.2s;
        }
        .fq-num{font-size:12px;font-weight:600;color:var(--primary);margin-bottom:6px;}
        .fq-title{font-size:16px;font-weight:500;margin-bottom:14px;line-height:1.5;}
        .fq-hint{font-size:12px;color:var(--gray-400);margin-bottom:10px;}

        .opt-row{
            display:flex;align-items:center;
            padding:10px 14px;border:1px solid var(--gray-200);
            border-radius:var(--r);margin-bottom:8px;cursor:pointer;
            transition:all .15s;background:var(--gray-50);font-size:14px;
        }
        .opt-row:hover{border-color:var(--primary-light);background:#eef2ff;}
        .opt-row.on{border-color:var(--primary);background:#eef2ff;font-weight:500;}
        .opt-row input{margin-right:10px;accent-color:var(--primary);width:16px;height:16px;cursor:pointer;}

        /* ── Stats ────────────────────────────────────────── */
        .stat-cards{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap;}
        .stat-card{
            flex:1;min-width:120px;background:#fff;border:1px solid var(--gray-200);
            border-radius:var(--r);padding:16px;text-align:center;
        }
        .stat-val{font-size:28px;font-weight:700;color:var(--primary);}
        .stat-lbl{font-size:12px;color:var(--gray-400);margin-top:3px;}

        .stat-q{
            background:#fff;border:1px solid var(--gray-200);
            border-radius:var(--r);padding:20px;margin-bottom:12px;
        }
        .stat-q-title{font-weight:600;font-size:15px;margin-bottom:14px;line-height:1.4;}

        .bar-row{margin-bottom:10px;}
        .bar-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
        .bar-track{height:9px;background:var(--gray-100);border-radius:5px;overflow:hidden;}
        .bar-fill{
            height:100%;
            background:linear-gradient(90deg,var(--primary),var(--primary-light));
            border-radius:5px;transition:width .6s ease;
        }

        .num-boxes{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
        .num-box{
            background:var(--gray-50);border:1px solid var(--gray-200);
            border-radius:var(--r);padding:11px 18px;text-align:center;min-width:80px;
        }
        .num-box-val{font-size:22px;font-weight:700;color:var(--primary);}
        .num-box-lbl{font-size:11px;color:var(--gray-400);margin-top:2px;}

        .text-list{list-style:none;}
        .text-list li{
            padding:7px 12px;border-left:3px solid var(--gray-200);margin-bottom:6px;
            font-size:14px;color:var(--gray-600);background:var(--gray-50);
            border-radius:0 var(--r) var(--r) 0;
        }

        /* ── Toast ────────────────────────────────────────── */
        #toasts{position:fixed;top:68px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
        .toast{
            padding:11px 16px;border-radius:var(--r);font-size:14px;font-weight:500;
            max-width:320px;box-shadow:var(--shadow-lg);
            display:flex;align-items:center;gap:9px;animation:toastIn .3s ease;
        }
        .toast-ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;}
        .toast-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
        .toast-info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;}
        @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

        /* ── Empty state ─────────────────────────────────── */
        .empty{text-align:center;padding:48px 20px;color:var(--gray-400);}
        .empty-icon{font-size:46px;margin-bottom:12px;}

        /* ── Divider ─────────────────────────────────────── */
        hr.div{border:none;border-top:1px solid var(--gray-200);margin:18px 0;}

        /* ── Thank you screen ────────────────────────────── */
        .ty-screen{text-align:center;padding:80px 20px;}
        .ty-screen .ty-icon{font-size:64px;margin-bottom:16px;}
        .ty-screen h2{font-size:22px;font-weight:700;margin-bottom:8px;}
        .ty-screen p{color:var(--gray-400);}

        @media(max-width:600px){
            .grid2{grid-template-columns:1fr;}
            .s-item{flex-wrap:wrap;}
            .s-actions{width:100%;justify-content:flex-end;}
        }
    </style>
</head>
<body>

<div id="toasts"></div>

<!-- ════════════════ HEADER ════════════════ -->
<header class="header">
    <div class="header-logo">Survey<span>Hub</span></div>
    <div class="header-user" id="header-user">
        <span class="uname" id="header-uname"></span>
        <button class="btn btn-o btn-sm"
            style="color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1)"
            onclick="doLogout()">退出登录</button>
    </div>
</header>

<div class="wrap">

<!-- ════════════════ 1. AUTH ════════════════ -->
<div id="sec-auth" class="section active">
    <div style="max-width:400px;margin:56px auto 0">
        <div style="text-align:center;margin-bottom:26px">
            <h1 style="font-size:26px;font-weight:700">欢迎使用 SurveyHub</h1>
            <p style="color:var(--gray-400);margin-top:8px;font-size:14px">华东师范大学 · MongoDB 全功能问卷系统</p>
        </div>
        <div class="card">
            <div class="auth-tabs">
                <div class="auth-tab on" id="tab-login" onclick="switchTab('login')">立即登录</div>
                <div class="auth-tab"   id="tab-reg"   onclick="switchTab('reg')">注册账号</div>
            </div>
            <div class="auth-body">
                <div class="fg">
                    <label class="fl">用户名</label>
                    <input class="fi" id="au" placeholder="请输入用户名"
                        onkeydown="if(event.key==='Enter')doAuth()">
                </div>
                <div class="fg">
                    <label class="fl">密码</label>
                    <input class="fi" type="password" id="ap" placeholder="请输入密码（至少 6 位）"
                        onkeydown="if(event.key==='Enter')doAuth()">
                </div>
                <button class="btn btn-p btn-full btn-lg" id="auth-btn" onclick="doAuth()">登录</button>
            </div>
        </div>
    </div>
</div>

<!-- ════════════════ 2. DASHBOARD ════════════════ -->
<div id="sec-dash" class="section">
    <div class="pg-title">
        <div>
            <h1 id="dash-title">我的问卷</h1>
            <p>管理您创建的所有问卷</p>
        </div>
        <button class="btn btn-p" onclick="showCreate()">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"/>
            </svg>
            设计新问卷
        </button>
    </div>
    <div class="card">
        <div class="card-hd">
            <h2>历史问卷库</h2>
            <button class="btn btn-o btn-sm" onclick="loadDash()">↻ 刷新</button>
        </div>
        <div class="card-bd" style="padding:14px">
            <div id="surveys-box">
                <div class="empty"><div class="empty-icon">📋</div><p>暂无问卷，点击右上角"设计新问卷"开始创建</p></div>
            </div>
        </div>
    </div>
</div>

<!-- ════════════════ 3. CREATE ════════════════ -->
<div id="sec-create" class="section">
    <div class="pg-title">
        <div><h1>设计问卷</h1><p>添加题目并配置校验规则与跳转逻辑</p></div>
        <button class="btn btn-o" onclick="show('dash')">← 返回</button>
    </div>
    <div class="card">
        <div class="card-bd">
            <div class="fg">
                <label class="fl">问卷标题 <span class="req">*</span></label>
                <input class="fi" id="sv-title" placeholder="例如：2026届大学生就业意向调研">
            </div>
            <div class="fg" style="margin-bottom:0">
                <label class="fl">问卷说明（选填）</label>
                <textarea class="fi" id="sv-desc" rows="2" placeholder="填写说明文字，让受访者了解调研目的…"></textarea>
            </div>
        </div>
    </div>

    <div style="margin-top:18px">
        <div id="q-builder"></div>
        <div class="add-toolbar">
            <span>添加题目：</span>
            <button class="btn btn-o btn-sm" onclick="addQ('single_choice')">＋ 单选题</button>
            <button class="btn btn-o btn-sm" onclick="addQ('multi_choice')">＋ 多选题</button>
            <button class="btn btn-o btn-sm" onclick="addQ('number_fill')">＋ 数字填空</button>
            <button class="btn btn-o btn-sm" onclick="addQ('text_fill')">＋ 文本填空</button>
        </div>
    </div>

    <div style="margin-top:20px;display:flex;gap:12px">
        <button class="btn btn-g btn-lg" onclick="publishSurvey()">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>
            </svg>
            正式发布问卷
        </button>
        <button class="btn btn-o btn-lg" onclick="show('dash')">取消</button>
    </div>
</div>

<!-- ════════════════ 4. FILL ════════════════ -->
<div id="sec-fill" class="section">
    <div class="fill-banner">
        <h2 id="fill-title"></h2>
        <p id="fill-desc"></p>
    </div>
    <div id="fill-qs"></div>
    <div style="display:flex;gap:12px;margin-top:8px">
        <button class="btn btn-g btn-lg" onclick="submitFill()">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>
            </svg>
            提交答卷
        </button>
        <button class="btn btn-o btn-lg" id="fill-back" onclick="show('dash')">返回仪表盘</button>
    </div>
</div>

<!-- ════════════════ 5. STATS ════════════════ -->
<div id="sec-stats" class="section">
    <div class="pg-title">
        <div>
            <h1 id="stats-title">问卷统计</h1>
            <p id="stats-sub">基于全部已提交答卷的数据汇总</p>
        </div>
        <button class="btn btn-o" onclick="show('dash')">← 返回</button>
    </div>
    <div class="stat-cards" id="stat-cards"></div>
    <div id="stat-qs"></div>
</div>

</div><!-- /wrap -->

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let ME = null;
let Qs = [];
let fillId = '';
let fillSurvey = null;
let authTab = 'login';

const TYPE_NAMES = {
    single_choice:'单选题', multi_choice:'多选题',
    number_fill:'数字填空', text_fill:'文本填空'
};

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
    const r = await fetch('/api/me');
    if (r.ok) {
        ME = await r.json();
        setUser(ME.username);
    }
    // 检测是否通过 /survey/<id> 直接访问
    const m = location.pathname.match(/^\/survey\/([a-f0-9]{24})$/);
    if (m) {
        await startFill(m[1]);
    } else if (ME) {
        show('dash');
        loadDash();
    } else {
        show('auth');
    }
});

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function toast(msg, type='info', ms=3500) {
    const icons = {ok:'✓', err:'✕', info:'ℹ'};
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<span>${icons[type]||icons.info}</span><span>${msg}</span>`;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => {
        el.style.animation = 'toastOut .3s ease forwards';
        setTimeout(() => el.remove(), 300);
    }, ms);
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
function show(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(`sec-${name}`).classList.add('active');
}

function setUser(uname) {
    document.getElementById('header-user').style.display = 'flex';
    document.getElementById('header-uname').textContent = uname;
}

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
function switchTab(tab) {
    authTab = tab;
    document.getElementById('tab-login').classList.toggle('on', tab==='login');
    document.getElementById('tab-reg').classList.toggle('on', tab==='reg');
    document.getElementById('auth-btn').textContent = tab==='login' ? '登录' : '注册';
}

async function doAuth() {
    const u = document.getElementById('au').value.trim();
    const p = document.getElementById('ap').value;
    if (!u || !p) { toast('请填写用户名和密码','err'); return; }
    const url = authTab==='login' ? '/api/login' : '/api/register';
    const r = await fetch(url, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username:u, password:p})
    });
    const d = await r.json();
    if (authTab === 'reg') {
        if (d.error) { toast(d.error,'err'); return; }
        toast(d.msg,'ok');
        switchTab('login');
    } else {
        if (d.error) { toast(d.error,'err'); return; }
        ME = {username: d.username};
        setUser(d.username);
        toast(`欢迎回来，${d.username}！`,'ok');
        show('dash'); loadDash();
    }
}

async function doLogout() {
    await fetch('/api/logout', {method:'POST'});
    ME = null;
    document.getElementById('header-user').style.display = 'none';
    show('auth');
    toast('已退出登录','info');
}

/* ═══════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════ */
async function loadDash() {
    if (!ME) return;
    document.getElementById('dash-title').textContent = ME.username + ' 的问卷';
    const r = await fetch('/api/my_surveys');
    if (!r.ok) { toast('加载失败，请重试','err'); return; }
    const list = await r.json();
    const box = document.getElementById('surveys-box');
    if (!list.length) {
        box.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>暂无问卷，点击"设计新问卷"开始创建</p></div>';
        return;
    }
    box.innerHTML = '<div class="s-list">' + list.map(s => {
        const closed = s.status === 'closed';
        return `
        <div class="s-item">
            <div class="s-info">
                <div class="s-title" title="${x(s.title)}">${x(s.title)}</div>
                <div class="s-meta">
                    <span class="badge ${closed?'badge-cls':'badge-pub'}">${closed?'已关闭':'进行中'}</span>
                    <span>📝 ${s.response_count||0} 份回复</span>
                    <span>🕐 ${s.created_at||''}</span>
                </div>
            </div>
            <div class="s-actions">
                <button class="btn btn-o btn-sm" onclick="copyLink('${s._id}')">分享</button>
                <button class="btn btn-c btn-sm" onclick="startFill('${s._id}')">填写</button>
                <button class="btn btn-sm" style="background:#7c3aed;color:#fff"
                    onclick="viewStats('${s._id}','${x(s.title)}')">统计</button>
                ${closed
                    ? `<button class="btn btn-o btn-sm" onclick="setStatus('${s._id}','published')">重开</button>`
                    : `<button class="btn btn-o btn-sm" onclick="setStatus('${s._id}','closed')">关闭</button>`}
                <button class="icon-btn" onclick="delSurvey('${s._id}','${x(s.title)}')" title="删除">
                    <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"/>
                    </svg>
                </button>
            </div>
        </div>`;
    }).join('') + '</div>';
}

function copyLink(id) {
    const url = `${location.origin}/survey/${id}`;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => toast('分享链接已复制','ok'));
    } else {
        toast('分享链接：' + url, 'info', 7000);
    }
}

async function setStatus(id, status) {
    const r = await fetch(`/api/surveys/${id}/status`, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({status})
    });
    const d = await r.json();
    if (d.error) { toast(d.error,'err'); return; }
    toast(d.msg,'ok'); loadDash();
}

async function delSurvey(id, title) {
    if (!confirm(`确认删除问卷「${title}」？\n此操作将同时删除所有答卷数据且不可撤销！`)) return;
    const r = await fetch(`/api/surveys/${id}`, {method:'DELETE'});
    const d = await r.json();
    if (d.error) { toast(d.error,'err'); return; }
    toast(d.msg,'ok'); loadDash();
}

/* ═══════════════════════════════════════════
   CREATE SURVEY
═══════════════════════════════════════════ */
function showCreate() {
    Qs = [];
    document.getElementById('sv-title').value = '';
    document.getElementById('sv-desc').value = '';
    renderBuilder();
    show('create');
}

function syncQs() {
    Qs.forEach((q, i) => {
        const t = document.getElementById(`qt_${i}`);
        if (t) q.title = t.value;
        const j = document.getElementById(`qj_${i}`);
        if (j) q.jump_logic = j.value;
        const req = document.getElementById(`qr_${i}`);
        if (req) q.is_required = req.checked;
        if (q.type.includes('choice')) {
            const o = document.getElementById(`qo_${i}`);
            if (o) q.options = o.value.split(/[,，]/).map(s=>s.trim()).filter(Boolean);
        }
        if (q.type === 'multi_choice') {
            const mn = document.getElementById(`qmns_${i}`);
            const mx = document.getElementById(`qmxs_${i}`);
            if (mn && mn.value!=='') q.min_select = parseInt(mn.value); else delete q.min_select;
            if (mx && mx.value!=='') q.max_select = parseInt(mx.value); else delete q.max_select;
        }
        if (q.type === 'number_fill') {
            const mn = document.getElementById(`qmn_${i}`);
            const mx = document.getElementById(`qmx_${i}`);
            if (mn && mn.value!=='') q.min = Number(mn.value); else delete q.min;
            if (mx && mx.value!=='') q.max = Number(mx.value); else delete q.max;
        }
    });
}

function addQ(type) {
    syncQs();
    Qs.push({q_id:`q${Qs.length+1}`, type, title:'', options: type.includes('choice')?[]:null});
    renderBuilder();
}

function removeQ(i) {
    syncQs();
    Qs.splice(i,1);
    Qs.forEach((q,idx) => q.q_id = `q${idx+1}`);
    renderBuilder();
}

function renderBuilder() {
    const el = document.getElementById('q-builder');
    if (!Qs.length) { el.innerHTML=''; return; }
    el.innerHTML = Qs.map((q,i) => {
        let extra = '';
        if (q.type.includes('choice')) {
            extra += `
            <div class="fg">
                <label class="fl">选项（中英文逗号分隔）<span class="req">*</span></label>
                <input class="fi" id="qo_${i}" placeholder="例如：选项A, 选项B, 选项C"
                    value="${x((q.options||[]).join(', '))}">
            </div>`;
        }
        if (q.type === 'multi_choice') {
            extra += `
            <div class="grid2">
                <div class="fg"><label class="fl">最少选择数（选填）</label>
                    <input type="number" class="fi" id="qmns_${i}" placeholder="不限" min="1"
                        value="${q.min_select!==undefined?q.min_select:''}"></div>
                <div class="fg"><label class="fl">最多选择数（选填）</label>
                    <input type="number" class="fi" id="qmxs_${i}" placeholder="不限" min="1"
                        value="${q.max_select!==undefined?q.max_select:''}"></div>
            </div>`;
        }
        if (q.type === 'number_fill') {
            extra += `
            <div class="grid2">
                <div class="fg"><label class="fl">最小值（选填）</label>
                    <input type="number" class="fi" id="qmn_${i}" placeholder="不限"
                        value="${q.min!==undefined?q.min:''}"></div>
                <div class="fg"><label class="fl">最大值（选填）</label>
                    <input type="number" class="fi" id="qmx_${i}" placeholder="不限"
                        value="${q.max!==undefined?q.max:''}"></div>
            </div>`;
        }
        return `
        <div class="q-card">
            <div class="q-card-hd">
                <div class="q-card-label">
                    <span>题目 ${i+1}</span>
                    <span class="q-type-tag">${TYPE_NAMES[q.type]||q.type}</span>
                    <span class="q-id-tag">ID: ${q.q_id}</span>
                </div>
                <button class="icon-btn" onclick="removeQ(${i})" title="删除此题">
                    <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
                    </svg>
                </button>
            </div>
            <div class="fg">
                <label class="fl">题目标题 <span class="req">*</span></label>
                <input class="fi" id="qt_${i}" placeholder="请输入题目内容"
                    value="${x(q.title||'')}">
            </div>
            ${extra}
            <div class="grid2">
                <div class="fg">
                    <label class="fl">跳转逻辑（选填）</label>
                    <input class="fi" id="qj_${i}" placeholder="格式：选项A->q3, 选项B->q5"
                        value="${x(q.jump_logic||'')}">
                </div>
                <div class="fg" style="display:flex;align-items:flex-end;padding-bottom:1px">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px">
                        <input type="checkbox" id="qr_${i}" ${q.is_required?'checked':''}
                            style="width:16px;height:16px;accent-color:var(--primary);cursor:pointer">
                        <span>设为必填</span>
                    </label>
                </div>
            </div>
        </div>`;
    }).join('');
}

async function publishSurvey() {
    syncQs();
    const title = document.getElementById('sv-title').value.trim();
    const desc  = document.getElementById('sv-desc').value.trim();
    if (!title) { toast('请填写问卷标题','err'); return; }
    if (!Qs.length) { toast('请至少添加一道题目','err'); return; }
    for (let i=0; i<Qs.length; i++) {
        if (!Qs[i].title.trim()) { toast(`题目 ${i+1} 的标题不能为空`,'err'); return; }
        if (Qs[i].type.includes('choice') && (!Qs[i].options||Qs[i].options.length<2)) {
            toast(`题目 ${i+1} 的选项至少需要 2 个`,'err'); return;
        }
    }
    const r = await fetch('/api/surveys', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({title, description:desc, questions:Qs})
    });
    const d = await r.json();
    if (d.error) { toast(d.error,'err'); return; }
    toast(d.msg,'ok');
    show('dash'); loadDash();
}

/* ═══════════════════════════════════════════
   FILL SURVEY
═══════════════════════════════════════════ */
async function startFill(id) {
    fillId = id;
    const r = await fetch(`/api/surveys/${id}`);
    if (!r.ok) { toast('获取问卷失败，请检查链接是否正确','err'); return; }
    fillSurvey = await r.json();

    if (fillSurvey.status === 'closed') {
        toast('该问卷已关闭，不再接受填写','err'); return;
    }

    document.getElementById('fill-title').textContent = fillSurvey.title;
    document.getElementById('fill-desc').textContent  = fillSurvey.description || '';
    document.getElementById('fill-back').style.display = ME ? '' : 'none';

    document.getElementById('fill-qs').innerHTML = fillSurvey.questions.map((q,i) => {
        let inp = '';
        if (q.type === 'single_choice') {
            inp = q.options.map(opt => `
            <label class="opt-row" id="ol_${q.q_id}_${x(opt)}">
                <input type="radio" name="${q.q_id}" value="${x(opt)}"
                    onchange="optStyle(this);evalLogic()"> ${x(opt)}
            </label>`).join('');
        } else if (q.type === 'multi_choice') {
            let hint = '';
            if (q.min_select && q.max_select) hint = `请选择 ${q.min_select}~${q.max_select} 项`;
            else if (q.min_select) hint = `至少选择 ${q.min_select} 项`;
            else if (q.max_select) hint = `最多选择 ${q.max_select} 项`;
            inp = (hint?`<div class="fq-hint">${hint}</div>`:'') +
                q.options.map(opt => `
                <label class="opt-row" id="ol_${q.q_id}_${x(opt)}">
                    <input type="checkbox" name="${q.q_id}" value="${x(opt)}"
                        onchange="optStyle(this);evalLogic()"> ${x(opt)}
                </label>`).join('');
        } else {
            let hint='', ph='请输入内容';
            if (q.type==='number_fill') {
                ph = '请输入数字';
                if (q.min!==undefined && q.max!==undefined) hint=`范围：${q.min} ~ ${q.max}`;
                else if (q.min!==undefined) hint=`最小值：${q.min}`;
                else if (q.max!==undefined) hint=`最大值：${q.max}`;
            }
            inp = (hint?`<div class="fq-hint">${hint}</div>`:'') +
                `<input type="${q.type==='number_fill'?'number':'text'}" class="fi"
                    id="ans_${q.q_id}" placeholder="${ph}" oninput="evalLogic()">`;
        }
        return `
        <div id="fbox_${q.q_id}" class="fq-card fill-q-box">
            <div class="fq-num">第 ${i+1} 题${q.is_required?' <span class="req">必填</span>':''}</div>
            <div class="fq-title">${x(q.title)}</div>
            ${inp}
        </div>`;
    }).join('');

    show('fill');
    evalLogic();
}

function optStyle(input) {
    const parent = input.closest('.opt-row');
    if (!parent) return;
    if (input.type==='radio') {
        document.querySelectorAll(`input[name="${input.name}"]`).forEach(el =>
            el.closest('.opt-row')?.classList.remove('on'));
    }
    if (input.checked) parent.classList.add('on');
    else parent.classList.remove('on');
}

function evalLogic() {
    if (!fillSurvey) return;
    document.querySelectorAll('.fill-q-box').forEach(el => el.classList.remove('hidden'));
    let hideUntil = null;
    for (const q of fillSurvey.questions) {
        const box = document.getElementById(`fbox_${q.q_id}`);
        if (hideUntil) {
            if (q.q_id === hideUntil) hideUntil = null;
            else { box?.classList.add('hidden'); continue; }
        }
        if (q.jump_logic) {
            let val = null;
            if (q.type==='single_choice') {
                const el = document.querySelector(`input[name="${q.q_id}"]:checked`);
                if (el) val = el.value;
            } else if (q.type.includes('fill')) {
                val = document.getElementById(`ans_${q.q_id}`)?.value;
            }
            if (val) {
                for (const rule of q.jump_logic.split(/[,，]/)) {
                    const parts = rule.split('->');
                    if (parts.length===2 && parts[0].trim()===String(val).trim()) {
                        hideUntil = parts[1].trim(); break;
                    }
                }
            }
        }
    }
}

async function submitFill() {
    const answers = [];
    for (const q of fillSurvey.questions) {
        const box = document.getElementById(`fbox_${q.q_id}`);
        if (box?.classList.contains('hidden')) continue;
        if (q.type==='single_choice') {
            const sel = document.querySelector(`input[name="${q.q_id}"]:checked`);
            if (sel) answers.push({q_id:q.q_id, value:sel.value});
        } else if (q.type==='multi_choice') {
            const sel = Array.from(document.querySelectorAll(`input[name="${q.q_id}"]:checked`))
                             .map(el=>el.value);
            if (sel.length) answers.push({q_id:q.q_id, value:sel});
        } else {
            const val = document.getElementById(`ans_${q.q_id}`)?.value;
            if (val) answers.push({q_id:q.q_id, value:val});
        }
    }
    const r = await fetch(`/api/surveys/${fillId}/submit`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({answers})
    });
    const d = await r.json();
    if (d.error) { toast(d.error,'err',5000); return; }
    toast(d.msg||'提交成功！','ok');
    if (ME) { show('dash'); loadDash(); }
    else {
        document.getElementById('sec-fill').innerHTML = `
        <div class="ty-screen">
            <div class="ty-icon">🎉</div>
            <h2>感谢您的参与！</h2>
            <p>答卷已成功提交，感谢配合本次调研。</p>
        </div>`;
    }
}

/* ═══════════════════════════════════════════
   STATISTICS
═══════════════════════════════════════════ */
async function viewStats(id, title) {
    const r = await fetch(`/api/surveys/${id}/stats`);
    if (!r.ok) { const d=await r.json(); toast(d.error||'加载统计失败','err'); return; }
    const data = await r.json();

    document.getElementById('stats-title').textContent = data.survey_title || title || '统计';
    document.getElementById('stats-sub').textContent = `共收到 ${data.total_responses} 份回复`;

    document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card">
        <div class="stat-val">${data.total_responses}</div>
        <div class="stat-lbl">总回复数</div>
    </div>
    <div class="stat-card">
        <div class="stat-val">${Object.keys(data.questions).length}</div>
        <div class="stat-lbl">题目总数</div>
    </div>`;

    const qs = data.questions;
    document.getElementById('stat-qs').innerHTML = Object.entries(qs).map(([qId,s],idx) => {
        let body = '';
        if (s.type==='single_choice' || s.type==='multi_choice') {
            const answered = s.answered || 0;
            const entries = Object.entries(s.options);
            if (!entries.length || answered===0) {
                body = '<p style="color:var(--gray-400);font-size:14px">暂无回答数据</p>';
            } else {
                body = entries.map(([opt,cnt]) => {
                    const pct = answered>0 ? Math.round(cnt/answered*100) : 0;
                    return `
                    <div class="bar-row">
                        <div class="bar-meta">
                            <span>${x(opt)}</span>
                            <span><strong>${cnt}</strong> 票（${pct}%）</span>
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width:${pct}%"></div>
                        </div>
                    </div>`;
                }).join('');
            }
        } else if (s.type==='number_fill') {
            const boxes = [
                {val:s.avg??'-', lbl:'平均值'},
                {val:s.count??0,  lbl:'有效回答'},
                ...(s.values&&s.values.length ? [
                    {val:s.min??'-', lbl:'最小值'},
                    {val:s.max??'-', lbl:'最大值'}
                ] : [])
            ].map(b=>`
            <div class="num-box">
                <div class="num-box-val">${b.val}</div>
                <div class="num-box-lbl">${b.lbl}</div>
            </div>`).join('');
            const all = s.values&&s.values.length
                ? `<p style="font-size:12px;color:var(--gray-400);margin-top:4px">
                    所有回答：${s.values.join('、')}</p>` : '';
            body = `<div class="num-boxes">${boxes}</div>${all}`;
        } else {
            if (!s.values||!s.values.length) {
                body = '<p style="color:var(--gray-400);font-size:14px">暂无回答数据</p>';
            } else {
                body = `<ul class="text-list">${s.values.map(v=>`<li>${x(v)}</li>`).join('')}</ul>`;
            }
        }
        return `
        <div class="stat-q">
            <div class="stat-q-title">
                <span style="color:var(--gray-400);font-size:13px;margin-right:6px">Q${idx+1}</span>
                ${x(s.title)}
                <span class="badge badge-pub" style="margin-left:8px;font-size:11px">
                    ${TYPE_NAMES[s.type]||s.type}
                </span>
            </div>
            ${body}
        </div>`;
    }).join('');

    show('stats');
}

/* ═══════════════════════════════════════════
   XSS helper
═══════════════════════════════════════════ */
function x(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
